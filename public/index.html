<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CDN | Drag & Drop</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="glass-panel">
    <header>
      <h1><i class="fa-solid fa-cloud-arrow-up"></i> Antigravity CDN</h1>
      <p class="subtitle">Secure Drop Zone & Asset Manager</p>
      <button id="admin-btn" class="btn btn-admin" title="Admin Login"><i class="fa-solid fa-lock"></i></button>
    </header>

    <div class="upload-zone hidden" id="drop-zone">
      <div class="upload-content">
        <i class="fa-solid fa-arrow-up-from-bracket upload-icon"></i>
        <p>Drag and drop files here</p>
        <span class="subtext">or click to browse</span>
      </div>
      <input type="file" id="file-input" multiple style="display: none;">
    </div>

    <div class="files-container">
      <h2><i class="fa-solid fa-folder-open"></i> Uploaded Assets</h2>
      <div class="file-list" id="file-list">
        <!-- Files will be dynamically injected here -->
      </div>
    </div>
  </div>

  <div id="login-modal" class="modal-overlay hidden">
    <div class="glass-panel modal-content">
      <h2>Admin Login</h2>
      <form id="login-form">
        <!-- Hidden username for password managers -->
        <input type="text" name="username" value="admin" autocomplete="username" style="display:none">
        
        <div class="input-group">
          <input type="password" id="password-input" name="password" placeholder="Enter Password" autocomplete="current-password" required>
        </div>
        
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancel-login">Cancel</button>
          <button type="submit" class="btn btn-primary">Unlock</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="script.js"></script>
</body>
</html>
