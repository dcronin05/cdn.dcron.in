<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CDN — dcron.in</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header__inner">
        <a href="https://dcron.in/" class="logo-link">
          <div class="logo">
            <span class="logo__mark">&gt;</span>
            <span class="logo__text">dcron.in <span class="logo__sub">/ cdn</span></span>
            <span class="logo__cursor"></span>
          </div>
        </a>
        <nav class="menu">
          <ul class="menu__inner">
            <li><a href="https://dcron.in/">&lt; Home</a></li>
            <li><a href="https://docs.dcron.in/" target="_blank">Docs</a></li>
            <li><a href="https://affine.dcron.in/" target="_blank">Affine</a></li>
            <li><button id="admin-btn" class="btn-admin-nav" title="Admin Login"><i class="fa-solid fa-lock"></i></button></li>
          </ul>
        </nav>
      </div>
    </header>

    <div class="content">
      <main class="main-panel">
        <div class="app-header">
          <h2><i class="fa-solid fa-hard-drive"></i> Asset Manager & Drop Zone</h2>
          <p class="subtitle">Public Object Storage & Asset CDN</p>
        </div>

        <div class="upload-zone hidden" id="drop-zone">
          <div class="upload-content">
            <i class="fa-solid fa-arrow-up-from-bracket upload-icon"></i>
            <p>Drag and drop files here</p>
            <span class="subtext">or click to browse</span>
          </div>
          <div class="progress-container hidden" id="progress-container">
            <div class="progress-bar-track">
              <div class="progress-bar-fill" id="progress-bar"></div>
            </div>
            <span class="progress-text" id="progress-text">Uploading 0%</span>
          </div>
          <input type="file" id="file-input" multiple style="display: none;">
        </div>

        <div class="filter-bar">
          <div class="search-box">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="search-input" placeholder="Search assets...">
          </div>
          <div class="filter-controls">
            <div class="filter-pills">
              <button class="pill active" data-filter="all">All</button>
              <button class="pill" data-filter="image">Images</button>
              <button class="pill" data-filter="video">Videos</button>
              <button class="pill" data-filter="doc">Docs</button>
              <button class="pill" data-filter="archive">Archives</button>
            </div>
            <span id="asset-count" class="asset-count-text">0 files</span>
          </div>
        </div>

        <div class="pseudo-header-bar">
          <button class="pseudo-col sort-col" data-sort="name">
            <span>Name</span> <i class="sort-icon fa-solid fa-sort"></i>
          </button>
          <div class="pseudo-right">
            <button class="pseudo-col sort-col active" data-sort="date">
              <span>Date</span> <i class="sort-icon fa-solid fa-arrow-down"></i>
            </button>
            <button class="pseudo-col sort-col" data-sort="size">
              <span>Size</span> <i class="sort-icon fa-solid fa-sort"></i>
            </button>
          </div>
        </div>

        <div class="files-container">
          <div class="file-list" id="file-list">
            <!-- Files dynamically injected here -->
          </div>
        </div>
      </main>
    </div>

    <footer class="footer">
      <div class="footer__inner">
        <div class="footer__content">
          <span>&copy; 2026 <a href="https://dcron.in/">Daniel Cronin</a></span>
          <span>•</span>
          <span><a href="https://dcron.in/">dcron.in CDN</a></span>
        </div>
      </div>
    </footer>
  </div>

  <!-- Lightbox Preview Modal -->
  <div id="preview-modal" class="modal-overlay hidden">
    <div class="modal-content preview-modal-content">
      <div class="preview-header">
        <h3 id="preview-title">Asset Preview</h3>
        <button class="btn-close" id="close-preview"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="preview-body" id="preview-body">
        <!-- Media preview injected here -->
      </div>
      <div class="preview-footer">
        <a id="preview-download" href="#" target="_blank" class="btn btn-primary" download><i class="fa-solid fa-download"></i> Download</a>
        <button id="preview-copy" class="btn btn-secondary"><i class="fa-solid fa-link"></i> Copy URL</button>
        <button id="preview-share" class="btn btn-secondary"><i class="fa-solid fa-share-nodes"></i> Share Shortlink</button>
      </div>
    </div>
  </div>

  <!-- Admin Login Modal -->
  <div id="login-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h2>Admin Login</h2>
      <form id="login-form">
        <input type="text" name="username" value="admin" autocomplete="username" style="display:none">
        
        <div class="input-group">
          <input type="password" id="password-input" name="password" placeholder="Enter Password" autocomplete="current-password" required>
        </div>
        
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancel-login">Cancel</button>
          <button type="submit" class="btn btn-primary">Unlock</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="script.js"></script>
</body>
</html>
